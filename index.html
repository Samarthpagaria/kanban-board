<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <nav>
        <div class="left">Kanban</div>
        <button class="right" id="toggle-modal">Add New Task</button>
      </nav>
      <section class="board">
        <div id="todo" class="task-col">
          <div class="heading">
            <div class="left">To do</div>
            <div class="right">Count</div>
          </div>
        </div>
        <div id="progress" class="task-col">
          <div class="heading">
            <div class="left">Work in Progress</div>
            <div class="right">Count</div>
          </div>
        </div>
        <div id="done" class="task-col">
          <div class="heading">
            <div class="left">Done</div>
            <div class="right">Count</div>
          </div>
        </div>
      </section>
    </main>
    <div class="modal add-new-task">
      <div class="bg"></div>
      <div class="center">
        <input type="text" placeholder="Task Title" />
        <textarea placeholder="Task description"></textarea>
        <button id="add-task-btn" class="add-task-btn">Add Task</button>
      </div>
    </div>
  </body>
  <script src="script.js"></script>
</html>
